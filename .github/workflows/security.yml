name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-disclosed CVEs are caught even when no code changes.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    # Pinned to a commit SHA (not @main) per the org's own pinGitHubActionDigests convention —
    # a moving branch ref would let a compromised or unexpectedly-changed org workflow silently
    # run in this repo's CI. Bump deliberately: re-check cfdude/.github before updating the SHA.
    uses: cfdude/.github/.github/workflows/security-semgrep.yml@78d5710aa7aa61e40afd490b8192bd44f931759c  # main @ 2026-07-20
    permissions:
      contents: read
      security-events: write

  trivy:
    name: Trivy filesystem scan
    uses: cfdude/.github/.github/workflows/security-trivy.yml@78d5710aa7aa61e40afd490b8192bd44f931759c  # main @ 2026-07-20
    permissions:
      contents: read
      security-events: write
