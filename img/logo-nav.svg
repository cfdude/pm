<svg width="100%" height="100%" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Import Futuristic Sci-Fi Font -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
            .pm-text { 
                font-family: 'Orbitron', system-ui, sans-serif; 
                font-weight: 900; 
                font-size: 44px; 
                fill: url(#neonGradient); 
                letter-spacing: 2px;
            }
            .plugin-text { 
                font-family: 'Orbitron', system-ui, sans-serif; 
                font-weight: 700; 
                font-size: 44px; 
                fill: currentColor; 
                letter-spacing: 1px;
            }
            .cyber-accent {
                stroke: currentColor;
                opacity: 0.6;
            }
        </style>

        <!-- AI/Cyberpunk Gradient -->
        <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="50%" stop-color="#4B00FF" />
            <stop offset="100%" stop-color="#B900FF" />
        </linearGradient>

        <!-- Neon Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- AI Automation Node Icon -->
    <g transform="translate(10, 0)">
        <!-- Outer Hexagon Base -->
        <polygon points="35,15 57,27.5 57,52.5 35,65 13,52.5 13,27.5" fill="none" stroke="url(#neonGradient)" stroke-width="3.5" stroke-linejoin="round"/>
        
        <!-- Glowing AI Core -->
        <circle cx="35" cy="40" r="7" fill="#00E5FF" filter="url(#glow)"/>
        
        <!-- Circuit Connectors -->
        <path d="M35,15 L35,26 M35,54 L35,65 M13,27.5 L25,34 M45,46 L57,52.5 M57,27.5 L45,34 M25,46 L13,52.5" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Data Link connecting to Text -->
        <path d="M62,40 L75,40" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    </g>

    <!-- Main Wordmark -->
    <text x="85" y="54">
        <tspan class="pm-text">PM</tspan><tspan class="plugin-text">-Plugin</tspan>
    </text>

    <!-- Sci-Fi Underline / Data Track -->
    <g transform="translate(0, 0)">
        <path d="M 85 66 L 165 66 L 175 74 L 360 74" fill="none" stroke="url(#neonGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        
        <!-- Automation Pulse Nodes -->
        <circle cx="360" cy="74" r="3" fill="#B900FF" filter="url(#glow)"/>
        <circle cx="345" cy="74" r="2" fill="#00E5FF" />
        <circle cx="335" cy="74" r="1.5" fill="#00E5FF" />
    </g>

    <!-- Cyberpunk UI Bracket on Right side -->
    <g transform="translate(0, 0)">
        <path d="M 375 25 L 385 25 L 385 55 L 375 55" fill="none" class="cyber-accent" stroke-width="2.5" stroke-linecap="square"/>
        <rect x="373" y="38" width="4" height="4" fill="#00E5FF" filter="url(#glow)" />
    </g>
</svg>
